name: Update Wembley Calendar Daily

on:
  schedule:
    # Runs everyday at 4:00 AM UTC
    - cron: '0 4 * * *'
  workflow_dispatch: # Allows you to force-run it manually via a button click

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        pip install requests beautifulsoup4 icalendar

    - name: Run Scraper Script
      run: python scrape_to_ics.py

    - name: Commit and Push updated ICS file
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated daily calendar update"
        file_pattern: "wembley_traffic.ics"
